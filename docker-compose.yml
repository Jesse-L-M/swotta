services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: swotta
      POSTGRES_PASSWORD: swotta_dev
      POSTGRES_DB: swotta_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swotta -d swotta_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: swotta
      POSTGRES_PASSWORD: swotta_test
      POSTGRES_DB: swotta_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swotta -d swotta_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

steps:
  # Step 1: Generate .env.production for Firebase client build-time vars
  # Next.js reads this file during `next build` to inline client-side env vars
  - name: "ubuntu"
    id: "env-setup"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        cat > .env.production << EOF
        NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        EOF

  # Step 2: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:latest"
      - "--cache-from"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:latest"
      - "."

  # Step 3: Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta"

  # Step 4: Run database migrations via Cloud SQL Auth Proxy
  # Uses node:20-alpine (not production image) because drizzle-kit is a devDependency
  - name: "node:20-alpine"
    id: "migrate"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        # Install Cloud SQL Auth Proxy
        wget -q -O /usr/local/bin/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
        chmod +x /usr/local/bin/cloud-sql-proxy

        # Start proxy in background
        /usr/local/bin/cloud-sql-proxy --port 5432 "${_DB_INSTANCE}" &
        PROXY_PID=$$!

        # Wait for proxy to be ready
        sleep 3

        # Install dependencies (includes drizzle-kit)
        npm ci

        # Enable pgvector extension (must exist before migration creates vector columns)
        # Install postgresql-client for psql
        apk add --no-cache postgresql-client
        PGPASSWORD="$$DB_PASSWORD" psql -h 127.0.0.1 -U swotta -d swotta \
          -c "CREATE EXTENSION IF NOT EXISTS vector;"

        # Run Drizzle migrations
        DATABASE_URL="postgresql://swotta:$$DB_PASSWORD@127.0.0.1:5432/swotta" \
          npx drizzle-kit migrate

        # Clean up proxy
        kill $$PROXY_PID 2>/dev/null || true
    secretEnv: ["DB_PASSWORD"]
    waitFor: ["push"]

  # Step 5: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_CLOUD_RUN_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--service-account=swotta-app-production@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--vpc-connector=${_VPC_CONNECTOR}"
      - "--vpc-egress=private-ranges-only"
      - "--cpu=2"
      - "--memory=1Gi"
      - "--min-instances=1"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=300"
      - "--update-env-vars=NODE_ENV=production,GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},GCS_PROJECT_ID=${PROJECT_ID}"
      - "--update-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest,FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID_SECRET}:latest,FIREBASE_CLIENT_EMAIL=${_FIREBASE_CLIENT_EMAIL_SECRET}:latest,FIREBASE_PRIVATE_KEY=${_FIREBASE_PRIVATE_KEY_SECRET}:latest,NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY_SECRET}:latest,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_SECRET}:latest,NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID_SECRET}:latest,ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY_SECRET}:latest,VOYAGE_API_KEY=${_VOYAGE_API_KEY_SECRET}:latest,RESEND_API_KEY=${_RESEND_API_KEY_SECRET}:latest,DIAGNOSTIC_SESSION_SECRET=${_DIAGNOSTIC_SESSION_SECRET_SECRET}:latest,SESSION_SHARE_SECRET=${_SESSION_SHARE_SECRET_SECRET}:latest"
      - "--quiet"
    waitFor: ["migrate"]

availableSecrets:
  secretManager:
    - versionName: "projects/${PROJECT_ID}/secrets/swotta-db-password-production/versions/latest"
      env: "DB_PASSWORD"

substitutions:
  _REGION: "europe-west2"
  _CLOUD_RUN_SERVICE: "swotta-app-production"
  _ARTIFACT_REPO: "swotta"
  _GCS_BUCKET_NAME: "swotta-uploads-production"
  _VPC_CONNECTOR: "swotta-vpc-cx-production"
  _DB_INSTANCE: ""
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _DATABASE_URL_SECRET: "swotta-database-url-production"
  _FIREBASE_PROJECT_ID_SECRET: "swotta-firebase-project-id-production"
  _FIREBASE_CLIENT_EMAIL_SECRET: "swotta-firebase-client-email-production"
  _FIREBASE_PRIVATE_KEY_SECRET: "swotta-firebase-private-key-production"
  _NEXT_PUBLIC_FIREBASE_API_KEY_SECRET: "swotta-next-public-firebase-api-key-production"
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN_SECRET: "swotta-next-public-firebase-auth-domain-production"
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID_SECRET: "swotta-next-public-firebase-project-id-production"
  _ANTHROPIC_API_KEY_SECRET: "swotta-anthropic-api-key-production"
  _VOYAGE_API_KEY_SECRET: "swotta-voyage-api-key-production"
  _RESEND_API_KEY_SECRET: "swotta-resend-api-key-production"
  _DIAGNOSTIC_SESSION_SECRET_SECRET: "swotta-diagnostic-session-secret-production"
  _SESSION_SHARE_SECRET_SECRET: "swotta-session-share-secret-production"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/swotta:latest"

timeout: "1200s"
